{{- /* TOC — collapsible for articles ≥800 words */ -}}
{{- if ge .WordCount 800 -}}
{{- $toc := .TableOfContents -}}
{{- if and $toc (ne $toc "<nav id=\"TableOfContents\"></nav>") -}}
<details class="toc-container" style="margin: 28px 0; background: var(--card-background); border: 1px solid var(--card-separator-color); border-radius: 10px; overflow: hidden;">
    <summary style="padding: 15px 22px; font-size: 1.1rem; font-weight: 700; color: var(--card-text-color-main); cursor: pointer; user-select: none; background: var(--card-background-selected); list-style: none; display: flex; align-items: center; justify-content: space-between; transition: background .15s;">
        <span style="display: inline-flex; align-items: center; gap: 10px;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--hp-accent, #2563eb)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;">
                <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
            </svg>
            Table of Contents
        </span>
        <span style="font-weight:400;font-size:0.82rem;color:var(--card-text-color-tertiary);">{{ .WordCount }} words</span>
    </summary>
    <div class="toc-content" style="padding: 12px 22px 20px 22px; line-height: 1.9;">
        {{ $toc | safeHTML }}
    </div>
</details>

<style>
.toc-content nav#TableOfContents { font-size: 0.95rem; }
.toc-content nav#TableOfContents ul { list-style: none; padding-left: 0; margin: 0; }
.toc-content nav#TableOfContents > ul { padding-left: 0; }
.toc-content nav#TableOfContents li { margin: 4px 0; position: relative; }
.toc-content nav#TableOfContents a {
    color: var(--card-text-color-secondary); text-decoration: none;
    font-size: 0.95rem; transition: color .15s, padding-left .15s;
    display: block; padding: 3px 0;
    border-left: 2px solid transparent; padding-left: 0;
}
.toc-content nav#TableOfContents a:hover {
    color: var(--hp-accent, #2563eb);
    border-left-color: var(--hp-accent, #2563eb);
    padding-left: 10px;
}
.toc-content nav#TableOfContents ul ul { padding-left: 16px; margin-top: 3px; }
.toc-content nav#TableOfContents ul ul a { font-size: 0.88rem; opacity: .85; }
.toc-container[open] summary {
    border-bottom: 1px solid var(--card-separator-color);
    background: var(--card-background-selected);
}
</style>
{{- end -}}
{{- end -}}
