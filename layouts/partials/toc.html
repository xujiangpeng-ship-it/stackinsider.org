{{- /* TOC — collapsible table of contents for articles ≥800 words */ -}}
{{- if ge .WordCount 800 -}}
{{- $toc := .TableOfContents -}}
{{- if and $toc (ne $toc "<nav id=\"TableOfContents\"></nav>") -}}
<details class="toc-container" style="margin: 28px 0; background: var(--card-background, #1e293b); border: 1px solid rgba(148,163,184,.1); border-radius: 10px; overflow: hidden;">
    <summary style="padding: 16px 22px; font-size: 1.05rem; font-weight: 700; color: var(--card-text-color-main, #e2e8f0); cursor: pointer; user-select: none; background: rgba(100,255,218,.04); list-style: none; display: flex; align-items: center; justify-content: space-between; transition: background 150ms ease;">
        <span style="display: inline-flex; align-items: center; gap: 10px;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#64ffda" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0; opacity:.8;">
                <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
            </svg>
            Table of Contents
        </span>
        <span style="font-weight:400;font-size:0.8rem;color:#64748b;">{{ .WordCount }} words</span>
    </summary>
    <div class="toc-content" style="padding: 12px 22px 20px 22px; line-height: 1.9;">
        {{ $toc | safeHTML }}
    </div>
</details>

<style>
.toc-content nav#TableOfContents { font-size: 0.88rem; }
.toc-content nav#TableOfContents ul {
    list-style: none;
    padding-left: 0;
    margin: 0;
}
.toc-content nav#TableOfContents > ul {
    padding-left: 0;
}
.toc-content nav#TableOfContents li {
    margin: 5px 0;
    position: relative;
}
.toc-content nav#TableOfContents a {
    color: #94a3b8;
    text-decoration: none;
    font-size: 0.88rem;
    transition: color 150ms ease, padding-left 150ms ease;
    display: block;
    padding: 3px 0;
    border-left: 2px solid transparent;
    padding-left: 0;
}
.toc-content nav#TableOfContents a:hover {
    color: #64ffda;
    border-left-color: #64ffda;
    padding-left: 10px;
}
.toc-content nav#TableOfContents ul ul {
    padding-left: 18px;
    margin-top: 3px;
}
.toc-content nav#TableOfContents ul ul a {
    font-size: 0.82rem;
    opacity: 0.8;
}
.toc-container[open] summary {
    border-bottom: 1px solid rgba(148,163,184,.06);
    background: rgba(100,255,218,.06);
}
</style>
{{- end -}}
{{- end -}}
