<div id="cookie-consent" class="cookie-consent">
  <div class="cookie-consent__inner">
    <p class="cookie-consent__text">
      This site uses cookies for analytics. By continuing to browse, you agree to our use of cookies.
    </p>
    <div class="cookie-consent__actions">
      <button id="cookie-accept" class="cookie-consent__btn cookie-consent__btn--accept">Accept</button>
      <a href="/privacy/" class="cookie-consent__btn cookie-consent__btn--learn">Learn More</a>
    </div>
  </div>
</div>

<style>
.cookie-consent {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 9999;
  background: linear-gradient(180deg, rgba(15,23,42,.96), rgba(15,23,42,.98));
  backdrop-filter: blur(12px);
  color: #e2e8f0;
  font-size: 13px;
  border-top: 1px solid rgba(100,255,218,.08);
  box-shadow: 0 -4px 24px rgba(0,0,0,.3);
  display: none;
}
.cookie-consent--visible { display: block; }
.cookie-consent__inner {
  max-width: 1100px;
  margin: 0 auto;
  padding: 16px 24px;
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 16px;
}
.cookie-consent__text {
  flex: 1 1 300px;
  margin: 0;
  line-height: 1.65;
  color: #94a3b8;
}
.cookie-consent__actions {
  display: flex;
  gap: 10px;
  flex-shrink: 0;
}
.cookie-consent__btn {
  display: inline-block;
  padding: 9px 22px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 600;
  text-decoration: none;
  border: none;
  cursor: pointer;
  transition: all 180ms ease;
  letter-spacing: 0.02em;
}
.cookie-consent__btn--accept {
  background: #64ffda;
  color: #0b1120;
}
.cookie-consent__btn--accept:hover {
  background: #45e0be;
  box-shadow: 0 2px 12px rgba(100,255,218,.25);
  transform: translateY(-1px);
}
.cookie-consent__btn--learn {
  background: transparent;
  color: #94a3b8;
  border: 1px solid rgba(148,163,184,.2);
}
.cookie-consent__btn--learn:hover {
  border-color: rgba(148,163,184,.4);
  color: #e2e8f0;
}
@media (max-width: 600px) {
  .cookie-consent__inner {
    flex-direction: column;
    text-align: center;
    padding: 14px 18px;
  }
}
</style>

<script>
(function() {
  var cc = document.getElementById('cookie-consent');
  if (!localStorage.getItem('cookie-consent-accepted')) {
    cc.className = 'cookie-consent cookie-consent--visible';
  }
  document.getElementById('cookie-accept').addEventListener('click', function() {
    localStorage.setItem('cookie-consent-accepted', '1');
    cc.className = 'cookie-consent';
  });
})();
</script>
