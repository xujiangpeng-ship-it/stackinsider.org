<div id="cookie-consent" class="cookie-consent">
  <div class="cookie-consent__inner">
    <p class="cookie-consent__text">
      This site uses cookies for analytics. By continuing to browse, you agree to our use of cookies.
    </p>
    <div class="cookie-consent__actions">
      <button id="cookie-accept" class="cookie-consent__btn cookie-consent__btn--accept">Accept</button>
      <a href="/privacy/" class="cookie-consent__btn cookie-consent__btn--learn">Learn More</a>
    </div>
  </div>
</div>

<style>
.cookie-consent {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 9999;
  background: #1a1a2e;
  color: #e0e0e0;
  font-size: 14px;
  box-shadow: 0 -2px 12px rgba(0,0,0,.15);
  display: none;
}
.cookie-consent--visible { display: block; }
.cookie-consent__inner {
  max-width: 1100px;
  margin: 0 auto;
  padding: 14px 20px;
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
}
.cookie-consent__text {
  flex: 1 1 300px;
  margin: 0;
  line-height: 1.6;
}
.cookie-consent__actions {
  display: flex;
  gap: 10px;
  flex-shrink: 0;
}
.cookie-consent__btn {
  display: inline-block;
  padding: 8px 20px;
  border-radius: 4px;
  font-size: 13px;
  font-weight: 500;
  text-decoration: none;
  border: none;
  cursor: pointer;
  transition: opacity .2s;
}
.cookie-consent__btn:hover { opacity: .85; }
.cookie-consent__btn--accept {
  background: #4caf50;
  color: #fff;
}
.cookie-consent__btn--learn {
  background: transparent;
  color: #b0b0b0;
  border: 1px solid #555;
}
@media (max-width: 600px) {
  .cookie-consent__inner {
    flex-direction: column;
    text-align: center;
    padding: 12px 16px;
  }
}
</style>

<script>
(function() {
  var cc = document.getElementById('cookie-consent');
  if (!localStorage.getItem('cookie-consent-accepted')) {
    cc.className = 'cookie-consent cookie-consent--visible';
  }
  document.getElementById('cookie-accept').addEventListener('click', function() {
    localStorage.setItem('cookie-consent-accepted', '1');
    cc.className = 'cookie-consent';
  });
})();
</script>
