{{- /* Schema: Article — fixed version with safe defaults */ -}}
{{- $author := .Params.author | default "" -}}
{{- $authorName := $author -}}
{{- if eq $authorName "" -}}{{- $authorName = site.Params.author.name | default "Stack Insider Team" -}}{{- end -}}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Article",
  "headline": {{ .Title | jsonify }},
  "description": {{ .Description | jsonify }},
  "url": "{{ .Permalink }}",
  "datePublished": "{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}",
  "dateModified": "{{ .Lastmod.Format "2006-01-02T15:04:05Z07:00" }}",
  "author": {
    "@type": "Person",
    "name": {{ $authorName | jsonify }},
    "url": "{{ .Site.BaseURL }}author/{{ $authorName | urlize }}/"
  },
  "publisher": {
    "@type": "Organization",
    "name": "Stack Insider",
    "logo": {
      "@type": "ImageObject",
      "url": "{{ .Site.BaseURL }}images/stackinsider-logo.png"
    }
  }{{- with .Params.image }},
  "image": "{{ . | absURL }}"{{- end }},
  "articleSection": "{{ .Section }}"{{- with .Params.tags }},
  "keywords": {{ . | jsonify }}{{- end }},
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": "{{ .Permalink }}"
  }
}
</script>
