{{- /* Schema: CollectionPage (for category/tag listing pages) */ -}}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "CollectionPage",
  "name": {{ .Title | jsonify }},
  "description": {{ .Description | jsonify }},
  "url": "{{ .Permalink }}",
  "publisher": {
    "@type": "Organization",
    "name": "Stack Insider",
    "logo": {
      "@type": "ImageObject",
      "url": "{{ .Site.BaseURL }}images/stackinsider-logo.png"
    }
  }
}
</script>
