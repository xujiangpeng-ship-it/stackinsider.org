{{- /* Schema: BreadcrumbList — fixed version with proper conditional logic */ -}}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
  {
    "@type": "ListItem",
    "position": 1,
    "name": "Home",
    "item": "{{ .Site.BaseURL }}"
  }{{- if ne .RelPermalink "/" }},
  {
    "@type": "ListItem",
    "position": 2,
    "name": {{ .Section | title | jsonify }},
    "item": "{{ .Site.BaseURL }}{{ .Section }}/"
  }{{- end }}{{ if ne .RelPermalink "/" }},
  {
    "@type": "ListItem",
    "position": 3,
    "name": {{ .Title | jsonify }},
    "item": "{{ .Permalink }}"
  }{{- end }}
  ]
}
</script>
