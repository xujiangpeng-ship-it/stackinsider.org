{{- /* Schema: BreadcrumbList */ -}}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
  {
    "@type": "ListItem",
    "position": 1,
    "name": "Home",
    "item": "{{ .Site.BaseURL }}"
  }
  {{- if ne .RelPermalink "/" }},
  {
    "@type": "ListItem",
    "position": 2,
    "name": {{ .Section | title | jsonify }},
    "item": "{{ .Site.BaseURL }}{{ .Section }}/"
  }
  {{- end }},
  {
    "@type": "ListItem",
    "position": {{ if eq .RelPermalink "/" }}1{{ else }}3{{ end }},
    "name": {{ .Title | jsonify }},
    "item": "{{ .Permalink }}"
  }
  ]
}
</script>
