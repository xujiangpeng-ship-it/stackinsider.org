{{- /* Schema: FAQPage — fixed version: only renders when .Params.faq exists and is non-empty */ -}}
{{- with .Params.faq -}}
{{- if gt (len .) 0 -}}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
  {{- range $i, $q := . }}
  {
    "@type": "Question",
    "name": {{ $q.question | jsonify }},
    "acceptedAnswer": {
      "@type": "Answer",
      "text": {{ $q.answer | jsonify }}
    }
    }{{ if ne $i (sub (len $.Params.faq) 1) }},{{ end }}
  {{- end }}
  ]
}
</script>
{{- end -}}
{{- end -}}
