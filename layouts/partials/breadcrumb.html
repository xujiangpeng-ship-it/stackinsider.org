{{- /* Breadcrumb — Home / Posts / Article Title */ -}}
<nav aria-label="Breadcrumb" style="padding: 12px 0 14px 0; font-size: 1.32rem; display: flex; align-items: center; gap: 0; flex-wrap: wrap;">
    <a href="{{ .Site.BaseURL }}" style="color: var(--card-text-color-tertiary); text-decoration: none; transition: color .15s;" onmouseover="this.style.color='var(--hp-accent, #2563eb)'" onmouseout="this.style.color=''">Home</a>
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin: 0 5px; flex-shrink: 0; opacity: .4;"><path d="M9 18l6-6-6-6"/></svg>
    <a href="{{ relLangURL "posts/" }}" style="color: var(--card-text-color-tertiary); text-decoration: none; transition: color .15s;" onmouseover="this.style.color='var(--hp-accent, #2563eb)'" onmouseout="this.style.color=''">Posts</a>
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin: 0 5px; flex-shrink: 0; opacity: .4;"><path d="M9 18l6-6-6-6"/></svg>
    <span style="color: var(--card-text-color-main); font-weight: 600;">{{ .Title | truncate 60 }}</span>
</nav>
