name: Auto AI Post and Deploy

on:
  schedule:
    - cron: '0 * * * *'   # Every 2 hours UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run all cleanup scripts
        run: |
          python cleanup_related.py
          python cleanup_ai_artifacts.py

      - name: Commit cleanup changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add content/ || true
          git diff --staged --quiet || (git commit -m "Clean up posts (placeholders & AI artifacts)" && git pull --rebase origin main && git push origin main)

      - name: Run AI article generator
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: python generate.py
             python generatr.py

      - name: Commit and push new post AND index file
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add content/posts/ keyword_index.txt || true
          git pull --rebase --autostash origin main
          git diff --staged --quiet || (git commit -m "Auto-generated post - $(date +%Y-%m-%d)" && git push origin main)

      - name: Pull latest code
        run: git pull origin main --rebase

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build Hugo site
        run: hugo --minify

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: stackinsider-org
          directory: public
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

# force schedule activation
