baseURL = "https://stackinsider.org/"
languageCode = "en-us"
locale = "en-us"
title = "Stack Insider — B2B Software Reviews & Comparisons"
theme = "hugo-theme-stack"
hasCJKLanguage = false

# 分页
[pagination]
  pagerSize = 6

# 版权
copyright = "© 2026 Stack Insider"

# 启用面包屑和文章版权
[params]
  mainSections = ["posts"]
  favicon = "/favicon.ico"
  featuredImageField = "image"

  # 侧边栏设置
  [params.sidebar]
    emoji = "®️"
    subtitle = "Expert software reviews & smarter stack decisions"
    avatar = "/images/stackinsider-logo.png"

  # 文章列表日期格式
  [params.article]
    dateFormat = "Jan 2, 2006"

  [params.dateFormat]
    published = "Jan 2, 2006"
    lastUpdated = "Jan 2, 2006"

  # 页脚链接
  [params.footer]
    [params.footer.custom]
      [params.footer.custom.privacy]
        title = "Privacy Policy"
        url = "/privacy/"
      [params.footer.custom.terms]
        title = "Terms"
        url = "/terms/"
      [params.footer.custom.about]
        title = "About"
        url = "/about/"
      [params.footer.custom.contact]
        title = "Contact"
        url = "/contact/"
      [params.footer.custom.editorial]
        title = "Editorial Policy"
        url = "/editorial-policy/"
      [params.footer.custom.cookie]
        title = "Cookie Policy"
        url = "/cookie-policy/"

  # 元数据 — Enhanced for SEO and AdSense compliance
  [params.metadata]
    author = "Stack Insider Editorial Team"
    description = "Independent B2B software reviews and comparisons by practitioners who actually use the tools. Honest analysis of CRM, ERP, accounting, and productivity software — no pay-to-play, no vendor hype."
    keywords = "software reviews, SaaS comparison, B2B software, best CRM, ERP software, project management tools, accounting software, AP automation, budgeting software, productivity apps, developer tools, stack decisions"
    publisher = "Stack Insider"

# 导航菜单
[[menu.main]]
  name = "Home"
  url = "/"
  weight = 1

[[menu.main]]
  name = "CRM"
  url = "/categories/crm/"
  weight = 2

[[menu.main]]
  name = "ERP"
  url = "/categories/erp/"
  weight = 3

[[menu.main]]
  name = "Project Mgmt"
  url = "/categories/project-management/"
  weight = 4

[[menu.main]]
  name = "Comparisons"
  url = "/categories/comparisons/"
  weight = 5

[[menu.main]]
  name = "About"
  url = "/about/"
  weight = 6

[[menu.main]]
  name = "Privacy"
  url = "/privacy/"
  weight = 7

[[menu.main]]
  name = "Contact"
  url = "/contact/"
  weight = 8

# 分类
[taxonomies]
  tag = "tags"
  category = "categories"

# Sitemap
[sitemap]
  changefreq = "daily"
  priority = 0.5
  filename = "sitemap.xml"

# 相关文章
[related]
  includeNewer = true
  threshold = 80
  toLower = true
  [[related.indices]]
    name = "tags"
    weight = 80
  [[related.indices]]
    name = "keywords"
    weight = 60
  [[related.indices]]
    name = "date"
    weight = 10

# 隐私
[privacy]
  [privacy.googleAnalytics]
    disable = false
    respectDoNotTrack = true
  [privacy.youtube]
    privacyEnhanced = true

# 作者
[author]
  name = "Stack Insider"

[params.author]
    name = "Gufei.Sun"
    bio = "B2B software consultant and former enterprise solutions architect. 10+ years evaluating ERP, CRM, and supply chain systems for mid-market and enterprise clients. Specializes in TCO analysis and implementation feasibility."
    avatar = "/images/authors/gufei-sun.jpg"

[outputs]
  home = ["HTML", "ROBOTS"]